<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TE Acompaño 😊</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1e3a5f">
</head>
<body>
    <header>
        <h1>😊 TE Acompaño</h1>
        <nav>
            <button data-module="rutinas">Rutinas</button>
            <button data-module="tareas">Tareas</button>
            <button data-module="emociones">Emociones</button>
            <button data-module="cambios">Cambios</button>
        </nav>
    </header>
    <main id="app">
        <!-- El contenido se carga dinámicamente -->
    </main>

    <!-- PIE DE PÁGINA CON TU NOMBRE -->
    <footer>
        <p>© 2026 Fredy Stuardo Abello · TE Acompaño 😊</p>
        <p style="font-size:0.7rem; opacity:0.6; margin-top:5px;">Esta aplicación es un apoyo complementario, no reemplaza la atención profesional. Ante cualquier duda, consulta a un especialista.</p>
    </footer>

    <!-- Scripts en orden (rutas relativas, sin / al inicio) -->
    <script src="js/DataManager.js"></script>
    <script src="js/Modulos/rutinas.js"></script>
    <script src="js/Modulos/tareas.js"></script>
    <script src="js/Modulos/emociones.js"></script>
    <script src="js/Modulos/cambios.js"></script>
    <script src="js/onboarding.js"></script>
    <script src="js/app.js"></script>

    <!-- Registro del Service Worker (ruta relativa, sin /) -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('✅ Service Worker registrado:', reg.scope))
                    .catch(err => console.error('❌ Error al registrar SW:', err));
            });
        }
    </script>
</body>
</html>
